version: 1

# ─── Tags del proyecto (aplicar en consola Amplify o vía CLI al crear/actualizar la app) ───
# aws amplify tag-resource \
#   --resource-arn <AMPLIFY_APP_ARN> \
#   --tags \
#     proyecto=Identera \
#     "cliente=Itera / Preventa" \
#     "arquitecto=Juan Castillo" \
#     "arquitecto2=Juan Pablo Molina" \
#     "arquitecto3=Andryd Ibarra" \
#     "PM=Xiomara Valencia" \
#     "Aprobador=Sebastian Sanchez"

customRules:
  # SPA rewrite: todas las rutas sin extensión de archivo → index.html
  # Así React Router maneja /login, /crear, /validar, etc.
  - source: </^[^.]+$|\.(?!(css|gif|ico|jpg|js|png|txt|svg|woff|woff2|ttf|map|json|webp)$)([^.]+$)/>
    target: /index.html
    status: 200

frontend:
  phases:
    preBuild:
      commands:
        - cd frontend
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: frontend/dist
    files:
      - '**/*'
  cache:
    paths:
      - frontend/node_modules/**/*
